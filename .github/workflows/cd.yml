name: Continuous Deployment

on:
  push:
    branches:
      - main

env:
  # Image name for Docker Hub (e.g., username/compileverse-backend)
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/compileverse-backend

jobs:
  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Home Server
    runs-on: [self-hosted, compileverse]
    needs: build-and-push

    steps:
      - name: Pull image and run docker compose
        run: |
          echo "Deploying on home server..."
          cd /home/avneesh/compileverse
          
          # Note: If your Docker Hub repository is private, you might need to authenticate docker here first
          # echo "${{ secrets.DOKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          
          docker compose pull
          docker compose up -d
